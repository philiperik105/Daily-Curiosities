name: Daily Curiosities

on:
  workflow_dispatch:         # triggered by cron-job.org daily at 21:00 Oslo time

permissions:
  contents: write

jobs:
  send-curiosities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run daily topics
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PAGES_URL:          https://philiperik105.github.io/Daily-Curiosities/
        run: python daily_topics.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,daily_topics.py,*.log'
